name: Auto-Translate Sync

on:
  push:
    branches:
      - master
    paths:
      - 'precis/fr/**/*.qmd'
      - 'precis/fr/**/_quarto.yml'
      - 'precis/ar/**/*.qmd'
      - 'precis/ar/**/_quarto.yml'
      - 'CHANGELOG.md'
  pull_request:
    paths:
      - 'precis/fr/**/*.qmd'
      - 'precis/fr/**/_quarto.yml'
      - 'precis/ar/**/*.qmd'
      - 'precis/ar/**/_quarto.yml'
      - 'CHANGELOG.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi
          CHANGED=$(git diff --name-only $BASE_SHA $HEAD_SHA | grep -E 'precis/(fr|ar)/.*\.(qmd|yml)$|^CHANGELOG\.md$' | tr '\n' ' ' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Run translation script
        if: steps.changed-files.outputs.files != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi
          echo "Translating files: ${{ steps.changed-files.outputs.files }}"
          uv run --with google-genai python scripts/translate_sync.py $BASE_SHA $HEAD_SHA ${{ steps.changed-files.outputs.files }}

      - name: Commit and Push changes
        if: steps.changed-files.outputs.files != ''
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add precis/
          git add CHANGELOG_ar.md 2>/dev/null || true
          
          # Vérifie s'il y a de nouveaux fichiers ou des modifications à commiter
          if ! git diff --staged --quiet; then
            git commit -m "Auto-translate sync (fr <-> ar) [skip ci]"
            git push
          else
            echo "No translation changes to commit."
          fi
